<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0F0F13" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Workout" />
<title>Workout</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg:        #0F0F13;
    --card:      #1A1A20;
    --border:    #2A2A32;
    --t1:        #FFFFFF;
    --t2:        #9A9AA5;
    --t3:        #6B6B76;
    --accent:    #FF6B35;
    --success:   #6BCB77;
    --warn:      #F4C95D;
    --rest-bg:   #15151A;
    --rest-acc:  #7C8AAE;
  }
 
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--t1);
    font-family: system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
 
  #app { min-height: 100vh; display: flex; flex-direction: column; }
 
  /* ---- SCREENS ---- */
  .screen { display: none; flex-direction: column; min-height: 100vh; }
  .screen.active { display: flex; }
 
  /* ---- PICKER ---- */
  #picker { padding: 32px 20px 40px; }
  .brand-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .brand-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--t2); }
  .dumbbell-icon { width: 20px; height: 20px; color: var(--accent); }
  #picker h1 { font-size: 30px; font-weight: 800; letter-spacing: -.02em; margin: 8px 0 24px; }
  .day-list { display: flex; flex-direction: column; gap: 12px; }
  .day-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px; border-radius: 16px;
    border: 1px solid var(--border); background: var(--card);
    text-align: left; width: 100%; cursor: pointer;
    transition: border-color .15s;
  }
  .day-card:active { border-color: var(--accent); }
  .day-card.rest-card { border-style: dashed; background: var(--rest-bg); cursor: default; }
  .day-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .1em; margin-bottom: 4px; color: var(--accent); }
  .day-card.rest-card .day-eyebrow { color: var(--rest-acc); }
  .day-name { font-size: 19px; font-weight: 800; color: var(--t1); letter-spacing: -.01em; }
  .day-card.rest-card .day-name { font-size: 17px; color: var(--t2); }
  .day-meta { font-size: 13px; color: var(--t2); margin-top: 2px; }
  .chevron { flex-shrink: 0; color: var(--t3); }
  .rest-icon-wrap { width: 36px; height: 36px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 12px; }
 
  /* ---- OVERVIEW ---- */
  #overview { display: none; flex-direction: column; }
  #overview.active { display: flex; }
  .overview-header { padding: 20px 20px 0; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: transparent; border: none;
    color: var(--t2); font-size: 14px; font-weight: 600;
    padding: 8px 0; cursor: pointer;
  }
  .overview-meta { padding: 12px 20px 0; }
  .day-key-label { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: .12em; }
  .overview-title { font-size: 32px; font-weight: 800; letter-spacing: -.02em; margin: 6px 0 2px; }
  .overview-sub { color: var(--t2); font-size: 15px; }
  .stats-row { display: flex; gap: 20px; margin-top: 20px; margin-bottom: 24px; }
  .stat-val { font-size: 22px; font-weight: 800; }
  .stat-lbl { font-size: 12px; color: var(--t3); }
  .ex-list { flex: 1; overflow-y: auto; padding: 0 20px; }
  .ex-list-inner { display: flex; flex-direction: column; gap: 8px; padding-bottom: 8px; }
  .ex-row {
    padding: 12px 16px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--border);
    cursor: pointer; text-align: left; width: 100%;
  }
  .ex-row-top { display: flex; align-items: center; justify-content: space-between; }
  .ex-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: #2A2A32; color: var(--t2);
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    margin-right: 10px;
  }
  .ex-name { font-size: 14px; font-weight: 600; color: var(--t1); }
  .ex-sets { font-size: 12px; color: var(--t2); }
  .effort-badge {
    font-size: 10px; font-weight: 700;
    padding: 3px 7px; border-radius: 6px; white-space: nowrap;
  }
  .ex-desc {
    font-size: 13px; color: var(--t2); line-height: 1.5;
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    display: none;
  }
  .ex-desc.open { display: block; }
  .overview-footer { padding: 20px; }
 
  /* ---- ACTIVE / SHARED WORKOUT HEADER ---- */
  #workout { display: none; flex-direction: column; }
  #workout.active { display: flex; }
  .workout-header { padding: 20px 20px 0; }
  .wh-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .exit-btn { background: transparent; border: none; color: var(--t3); font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .wh-day-name { font-size: 13px; font-weight: 700; color: var(--t2); }
  .progress-track { height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width .4s ease; width: 0%; }
 
  /* ---- SET SCREEN ---- */
  #set-screen { flex: 1; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 24px; text-align: center; }
  #set-screen.active { display: flex; }
  .ex-counter { font-size: 12px; font-weight: 700; color: var(--t3); letter-spacing: .12em; margin-bottom: 8px; }
  .set-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .set-ex-name { font-size: 28px; font-weight: 800; letter-spacing: -.02em; line-height: 1.1; }
  .info-btn { background: transparent; border: none; padding: 4px; cursor: pointer; flex-shrink: 0; }
  .set-effort-badge { font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 8px; margin-bottom: 28px; }
  .info-panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 20px;
    font-size: 13px; line-height: 1.5; color: var(--t2); text-align: left;
    max-width: 340px; display: none;
  }
  .info-panel.open { display: block; }
  .set-pips { display: flex; gap: 10px; margin-bottom: 28px; }
  .pip { border-radius: 50%; transition: all .2s ease; flex-shrink: 0; }
  .set-label { font-size: 15px; color: var(--t2); margin-bottom: 8px; }
  .rep-target { font-size: 56px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 36px; font-family: monospace; }
 
  /* ---- REST SCREEN ---- */
  #rest-screen { flex: 1; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 24px; text-align: center; }
  #rest-screen.active { display: flex; }
  .rest-label { font-size: 12px; font-weight: 700; color: var(--t3); letter-spacing: .12em; margin-bottom: 16px; }
  .ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 36px; }
  .ring-wrap svg { display: block; }
  .ring-center { position: absolute; display: flex; flex-direction: column; align-items: center; }
  .ring-time { font-size: 48px; font-weight: 800; color: var(--t1); font-family: monospace; letter-spacing: -.02em; }
  .ring-next { font-size: 13px; color: var(--t2); margin-top: 4px; }
  .rest-btn-row { display: flex; gap: 12px; width: 100%; max-width: 320px; }
  .rest-btn {
    flex: 1; padding: 16px; border-radius: 14px;
    border: 1px solid var(--border); background: transparent;
    color: var(--t1); font-weight: 700; font-size: 15px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer;
  }
 
  /* ---- COMPLETE ---- */
  #complete-screen { flex: 1; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 24px; text-align: center; }
  #complete-screen.active { display: flex; }
  .complete-icon { width: 72px; height: 72px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .complete-title { font-size: 28px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 8px; }
  .complete-sub { color: var(--t2); font-size: 15px; margin-bottom: 36px; }
 
  /* ---- BUTTONS ---- */
  .btn-primary {
    width: 100%; padding: 18px 24px; border-radius: 16px;
    background: var(--accent); color: #000;
    font-size: 16px; font-weight: 700; border: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; max-width: 320px;
  }
  .btn-primary:active { opacity: .85; }
  .btn-ghost {
    width: 100%; padding: 18px 24px; border-radius: 16px;
    background: transparent; color: var(--t2);
    font-size: 16px; font-weight: 700; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; max-width: 320px;
  }
 
  /* SVG icon helpers */
  svg { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>
<div id="app">
 
  <!-- PICKER -->
  <div class="screen active" id="picker">
    <div class="brand-row">
      <svg class="dumbbell-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5v14M18 5v14M2 9h4M18 9h4M2 15h4M18 15h4"/></svg>
      <span class="brand-label">Weekly Schedule</span>
    </div>
    <h1>Pick today's workout</h1>
    <div class="day-list" id="day-list"></div>
  </div>
 
  <!-- OVERVIEW -->
  <div class="screen" id="overview">
    <div class="overview-header">
      <button class="back-btn" onclick="showPicker()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Change day
      </button>
    </div>
    <div class="overview-meta">
      <div class="day-key-label" id="ov-day-label"></div>
      <div class="overview-title" id="ov-title"></div>
      <div class="overview-sub" id="ov-sub"></div>
      <div class="stats-row">
        <div><div class="stat-val" id="ov-excount"></div><div class="stat-lbl">exercises</div></div>
        <div><div class="stat-val" id="ov-sets"></div><div class="stat-lbl">total sets</div></div>
        <div><div class="stat-val" id="ov-mins"></div><div class="stat-lbl">est. minutes</div></div>
      </div>
    </div>
    <div class="ex-list">
      <div class="ex-list-inner" id="ex-list-inner"></div>
    </div>
    <div class="overview-footer">
      <button class="btn-primary" onclick="startWorkout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#000" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
        Start Workout
      </button>
    </div>
  </div>
 
  <!-- ACTIVE WORKOUT WRAPPER -->
  <div class="screen" id="workout">
    <div class="workout-header">
      <div class="wh-top">
        <button class="exit-btn" onclick="showPicker()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Exit
        </button>
        <span class="wh-day-name" id="wh-day-name"></span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
 
    <!-- SET SCREEN -->
    <div id="set-screen">
      <div class="ex-counter" id="ss-counter"></div>
      <div class="set-name-row">
        <div class="set-ex-name" id="ss-name"></div>
        <button class="info-btn" onclick="toggleInfo()" id="info-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="info-icon"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>
      </div>
      <div class="info-panel" id="info-panel"></div>
      <div class="set-effort-badge" id="ss-effort"></div>
      <div class="set-pips" id="ss-pips"></div>
      <div class="set-label" id="ss-setlabel"></div>
      <div class="rep-target" id="ss-reps"></div>
      <button class="btn-primary" onclick="completeSet()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Set Complete
      </button>
    </div>
 
    <!-- REST SCREEN -->
    <div id="rest-screen">
      <div class="rest-label" id="rest-label">RESTING</div>
      <div class="ring-wrap">
        <svg id="rest-ring-svg" width="240" height="240" style="transform:rotate(-90deg)">
          <circle id="ring-track" cx="120" cy="120" r="104" fill="none" stroke="var(--border)" stroke-width="12"/>
          <circle id="ring-fill" cx="120" cy="120" r="104" fill="none" stroke="var(--accent)" stroke-width="12" stroke-linecap="round"/>
        </svg>
        <div class="ring-center">
          <div class="ring-time" id="ring-time">0:00</div>
          <div class="ring-next" id="ring-next"></div>
        </div>
      </div>
      <div class="rest-btn-row">
        <button class="rest-btn" id="pause-btn" onclick="togglePause()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="pause-icon"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          <span id="pause-label">Pause</span>
        </button>
        <button class="rest-btn" onclick="skipRest()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          Skip
        </button>
      </div>
    </div>
 
    <!-- COMPLETE -->
    <div id="complete-screen">
      <div class="complete-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="complete-title">Workout complete</div>
      <div class="complete-sub" id="complete-sub"></div>
      <button class="btn-primary" onclick="showPicker()">Back to days</button>
    </div>
  </div>
 
</div>
 
<script>
// ---- THEME ----
const C = {
  accent: '#FF6B35', success: '#6BCB77', warn: '#F4C95D',
  border: '#2A2A32', card: '#1A1A20', restBg: '#15151A', restAcc: '#7C8AAE',
  t1: '#FFFFFF', t2: '#9A9AA5', t3: '#6B6B76'
};
 
// ---- DATA ----
const PLAN = {
  1: { name: "Pull & Grip A", sub: "Vertical Pull + Forearm Endurance", exercises: [
    { name: "Rock Hold Pull-Ups (working sets)", sets: 4, reps: "4-5", rest: 90, effort: "rpe7", description: "Use the rock climbing holds on the pull-up bar. Grip the holds firmly and pull your chest toward the bar by driving elbows down and back. Lower under full control to a dead hang each rep. Stop at 4-5 reps — do NOT go to failure. These sets are about practice, not exhaustion." },
    { name: "Rock Hold Pull-Ups (AMRAP)", sets: 1, reps: "AMRAP", rest: 120, effort: "fail", description: "One all-out set after your working sets. Go until you can't complete another rep with good form. This is your progress benchmark — track the number each week. After this set, go immediately into negatives before resting." },
    { name: "Pull-Up Negatives", sets: 1, reps: "3-5 slow", rest: 120, effort: "rpe8", description: "Immediately after your AMRAP set. Jump or step up to the top position (chin over bar), then lower yourself as slowly as possible — aim for 5-8 seconds per rep. These extend the stimulus after your muscles are already fatigued from the AMRAP." },
    { name: "Lat Pulldown (wide grip)", sets: 3, reps: "10-12", rest: 90, effort: "fail", description: "Sit at the lat pulldown station, grip the bar wider than shoulder width. Pull the bar down to upper chest level by driving elbows down and back, leading with your lats rather than your arms, then let the bar rise with control back to full stretch." },
    { name: "Chest-Supported Row", sets: 2, reps: "8-10", rest: 90, effort: "fail", description: "Lie face-down on an incline chest-support pad, dumbbells or machine handles hanging straight down. Pull elbows back and squeeze shoulder blades together, keeping your chest pinned to the pad throughout. Lower with control to full arm extension." },
    { name: "Rock Hold Dead Hang", sets: 3, reps: "20-30s hold", rest: 60, effort: "rpe8", description: "Hang from the rock climbing holds with arms fully extended, shoulder blades slightly depressed (pulled down, not shrugged). Relax your legs and breathe steadily. This directly trains the finger and grip endurance you need on a route. Build toward 30s holds before adding time." },
    { name: "Plate Pinch Hold", sets: 3, reps: "20-30s hold", rest: 60, effort: "rpe8", description: "Pinch a weight plate (start with 10lb) between your thumb and fingers, arm at your side. Hold for time without letting the plate slip. This builds the thumb opposition and pinch strength critical for slopers and compression holds in climbing." },
    { name: "Back Extension Hold (45°)", sets: 2, reps: "20-30s hold", rest: 60, effort: "rpe7", description: "Position yourself on a 45° back extension bench, hips on the pad, legs locked under the rollers. Keep your body in a straight line from head to heels and hold this position, engaging the lower back and glutes without arching past neutral." },
    { name: "Hollow Body Hold", sets: 3, reps: "30-45s", rest: 45, effort: "rpe8", description: "Lie on your back, arms extended overhead and legs straight. Press your lower back flat into the floor and lift shoulders and legs a few inches off the ground, forming a slight banana shape. Hold while breathing normally, keeping the lower back pinned down." },
  ]},
  2: { name: "Lower A", sub: "Quad Emphasis + Grip Finisher", exercises: [
    { name: "Leg Press", sets: 3, reps: "8-10", rest: 150, effort: "fail", description: "Sit in the leg press machine with feet shoulder-width on the platform, mid-foot centered. Lower the weight by bending knees toward your chest until knees reach about 90°, then press back up without locking knees out hard or letting your lower back round off the pad." },
    { name: "Lying Leg Curl", sets: 3, reps: "10-12", rest: 120, effort: "fail", description: "Lie face-down on the machine with the ankle pad just above your heels. Curl your heels toward your glutes by bending the knees, squeezing the hamstrings at the top, then lower with control without letting the weight slam down." },
    { name: "Hip Abduction Machine", sets: 2, reps: "12-15", rest: 90, effort: "rpe8", description: "Sit in the machine with knees against the pads, starting with legs together. Push your knees outward against the resistance, squeezing the outer glutes at the end range, then return with control. Keep your torso still and avoid leaning to generate momentum." },
    { name: "Walking Lunges (DB, light)", sets: 2, reps: "10/leg", rest: 90, effort: "rpe7", description: "Hold a light dumbbell in each hand. Step forward into a lunge, lowering your back knee toward the floor while keeping your front shin roughly vertical, then drive through the front heel to step into the next lunge. Keep your torso upright throughout." },
    { name: "Leg Extension", sets: 2, reps: "12-15", rest: 60, effort: "fail", description: "Sit in the machine with the pad resting just above your ankles, knees aligned with the machine's pivot. Extend your legs until straight, squeezing the quads at the top, then lower with control back to the starting bend." },
    { name: "Back Extension Hold (45°)", sets: 2, reps: "20-30s hold", rest: 60, effort: "rpe7", description: "Position yourself on a 45° back extension bench, hips on the pad, legs locked under the rollers. Keep your body in a straight line from head to heels and hold this position, engaging the lower back and glutes without arching past neutral." },
    { name: "Standing Calf Raise", sets: 3, reps: "12-15", rest: 60, effort: "rpe7", description: "Stand on the edge of a calf raise platform or step, balls of your feet on the edge, heels hanging off. Rise up onto your toes as high as possible, pause briefly, then lower your heels below the platform level for a full stretch before repeating." },
    { name: "Farmer Carry", sets: 3, reps: "30-40m walk", rest: 60, effort: "rpe8", description: "Pick up a heavy dumbbell in each hand, stand tall with shoulders back, and walk for 30-40 meters at a controlled pace. Grip the handles as hard as possible throughout. This builds crushing grip endurance and forearm stamina that translates directly to holding on during long routes." },
    { name: "L-Sit / Tuck Hold", sets: 3, reps: "15-30s", rest: 45, effort: "rpe8", description: "Support yourself on parallel bars or the floor with arms straight. Lift your knees toward your chest (tuck) or extend legs straight out in front (full L-sit), keeping shoulders depressed away from your ears. Hold the position while breathing steadily." },
  ]},
  3: { name: "Push + Shoulders", sub: "Press Support + Grip Finisher", exercises: [
    { name: "Barbell Bench Press", sets: 2, reps: "6-8", rest: 120, effort: "fail", description: "Lie on a flat bench, feet flat on floor. Grip bar slightly wider than shoulder-width. Lower bar with control to mid-chest, elbows at ~45° from torso, then press back up to full lock-out without bouncing off your chest. Reduced to 2 sets — bench is support work in a climbing-focused plan, not the priority." },
    { name: "Seated DB Shoulder Press", sets: 2, reps: "8-10", rest: 90, effort: "rpe8", description: "Sit on a bench with back support, dumbbells at shoulder height, palms facing forward. Press both dumbbells overhead until arms are extended without locking elbows aggressively, then lower back to shoulder height with control." },
    { name: "Cable Lateral Raise", sets: 2, reps: "12-15", rest: 60, effort: "rpe7", description: "Stand sideways to a low cable pulley, handle in the hand farthest from the machine. Raise your arm out to the side until it's roughly shoulder height, leading with the elbow, then lower with control. Avoid using momentum or shrugging the shoulder up." },
    { name: "Cable Face Pulls", sets: 2, reps: "12-15", rest: 60, effort: "rpe7", description: "Set a cable pulley to roughly head height with a rope attachment. Pull the rope toward your face, separating the ends apart as you pull, leading with your elbows high and out to the sides. Squeeze your rear shoulders and upper back at the end of the movement. Important for shoulder health and rotator cuff balance given the high pull volume in this program." },
    { name: "Push-Ups", sets: 2, reps: "AMRAP", rest: 90, effort: "rpe8", description: "Start in a plank position, hands slightly wider than shoulders. Lower your chest toward the floor keeping your body in a straight line, elbows tracking back at roughly 45°, then press back up to full arm extension without letting hips sag or pike." },
    { name: "Tricep Kickback", sets: 2, reps: "10-12", rest: 60, effort: "rpe7", description: "Hinge forward slightly at the hips with a flat back, upper arm pinned against your torso and parallel to the floor. Extend the forearm straight back until the arm is fully straight, squeezing the tricep, then return with control." },
    { name: "Wrist Roller", sets: 3, reps: "3 full rolls", rest: 60, effort: "rpe8", description: "Attach a weight to a wrist roller bar. Hold the bar at shoulder height with arms extended, then roll the weight up by alternating wrist rotations, then slowly lower it back down. This trains both forearm flexors and extensors — the balance between them is what prevents the elbow tendon issues climbers commonly develop." },
    { name: "Back Extension Hold (45°)", sets: 2, reps: "20-30s hold", rest: 60, effort: "rpe7", description: "Position yourself on a 45° back extension bench, hips on the pad, legs locked under the rollers. Keep your body in a straight line from head to heels and hold this position, engaging the lower back and glutes without arching past neutral." },
    { name: "Plank", sets: 3, reps: "45-60s", rest: 45, effort: "rpe8", description: "Support yourself on forearms and toes, body in a straight line from head to heels. Engage your core and glutes to prevent your hips from sagging or piking up. Breathe steadily and hold the position without letting your lower back arch." },
  ]},
  4: { name: "Lower B", sub: "Posterior Chain + Grip Finisher", exercises: [
    { name: "Leg Press (higher foot placement)", sets: 3, reps: "8-10", rest: 150, effort: "fail", description: "Sit in the leg press machine with feet placed higher and slightly wider on the platform than a standard quad-focused set-up. Lower the weight by bending knees toward your chest, then press back up, focusing on driving through your heels to bias the glutes and hamstrings." },
    { name: "Cable Pull-Through", sets: 3, reps: "10-12", rest: 120, effort: "rpe8", description: "Stand facing away from a low cable pulley, rope attachment between your legs. Hinge at the hips, pushing them back while keeping a flat back and soft knees, until you feel a stretch in your hamstrings, then drive your hips forward to standing, squeezing your glutes. Keep the movement controlled — do not rush near failure." },
    { name: "Barbell Hip Thrust", sets: 2, reps: "10-12", rest: 90, effort: "rpe8", description: "Sit on the floor with upper back against a bench, barbell positioned over your hips with padding. Drive through your heels to lift your hips up until your torso is parallel to the floor, squeezing your glutes hard at the top, then lower with control." },
    { name: "Bulgarian Split Squat (bodyweight/light)", sets: 2, reps: "10/leg", rest: 90, effort: "rpe7", description: "Stand a couple feet in front of a bench, rest the top of one foot behind you on the bench. Lower straight down by bending your front knee until your back knee nearly touches the floor, then drive through the front heel to stand back up. Keep your torso upright throughout." },
    { name: "Back Extension (45°, reps)", sets: 3, reps: "10-15", rest: 90, effort: "rpe8", description: "Position yourself on a 45° back extension bench, hips on the pad, legs locked under the rollers. Lower your torso forward with control until you feel a stretch in your hamstrings and lower back, then raise back up to a straight line without hyperextending past neutral at the top." },
    { name: "Seated Calf Raise", sets: 2, reps: "15-20", rest: 60, effort: "rpe7", description: "Sit in the seated calf raise machine with the pad resting on your thighs and balls of your feet on the platform. Rise up onto your toes as high as possible, pause briefly, then lower your heels for a full stretch before repeating." },
    { name: "Plate Pinch Hold", sets: 3, reps: "20-30s hold", rest: 60, effort: "rpe8", description: "Pinch a weight plate between your thumb and fingers, arm at your side. Hold for time without letting the plate slip. This builds the thumb opposition and pinch strength critical for slopers and compression holds in climbing." },
    { name: "Dragon Flag (or negatives)", sets: 3, reps: "5-8", rest: 60, effort: "rpe8", description: "Lie on a bench, gripping it behind your head for support. Keep your body straight and lower it from a vertical position down toward the bench with control, using only your core to control the descent, then pull back up to vertical. If full reps aren't available, perform slow negatives only." },
  ]},
  5: { name: "Pull & Grip B", sub: "Horizontal Pull + Forearm Strength", exercises: [
    { name: "Rock Hold Pull-Ups (working sets)", sets: 4, reps: "4-5", rest: 90, effort: "rpe7", description: "Use the rock climbing holds on the pull-up bar. Try a different grip width or hold type than Pull & Grip A if possible. Stop at 4-5 reps, never to failure. The frequency across the week is what builds pull-up strength, not grinding any single session." },
    { name: "Rock Hold Pull-Ups (AMRAP)", sets: 1, reps: "AMRAP", rest: 120, effort: "fail", description: "One all-out set after your working sets. Go until you can't complete another rep with good form. Track this number — it should trend upward week over week as the greasing-the-groove effect kicks in." },
    { name: "Pull-Up Negatives", sets: 1, reps: "3-5 slow", rest: 120, effort: "rpe8", description: "Immediately after your AMRAP set. Jump or step up to the top position (chin over bar), then lower yourself as slowly as possible — aim for 5-8 seconds per rep." },
    { name: "Chest-Supported Row", sets: 3, reps: "6-8", rest: 120, effort: "fail", description: "Lie face-down on an incline chest-support pad, dumbbells or machine handles hanging straight down. Pull elbows back and squeeze shoulder blades together, keeping your chest pinned to the pad throughout. Lower with control to full arm extension." },
    { name: "Cable Curl", sets: 2, reps: "10-12", rest: 60, effort: "rpe7", description: "Stand facing a low cable pulley with a straight or EZ-bar attachment. Keep elbows pinned to your sides and curl the bar up toward your shoulders, squeezing the biceps at the top, then lower under control. Bicep strength is directly relevant to pulling power on overhanging routes." },
    { name: "Rock Hold Dead Hang", sets: 4, reps: "20-40s hold", rest: 90, effort: "rpe8", description: "Hang from the rock climbing holds with arms fully extended, shoulder blades slightly depressed. Relax your legs and breathe steadily. This is the primary finger strength builder in the program. Progress by increasing hold time before adding sets. If the holds feel easy, try single-arm assisted hangs." },
    { name: "Wrist Roller", sets: 3, reps: "3 full rolls", rest: 60, effort: "rpe8", description: "Hold the bar at shoulder height with arms extended, then roll the weight up by alternating wrist rotations, then slowly lower it back down. Trains both forearm flexors and extensors for elbow tendon balance." },
    { name: "Back Extension Hold (45°)", sets: 2, reps: "20-30s hold", rest: 60, effort: "rpe7", description: "Position yourself on a 45° back extension bench, hips on the pad, legs locked under the rollers. Keep your body in a straight line from head to heels and hold this position, engaging the lower back and glutes without arching past neutral." },
    { name: "Hanging Leg Raises", sets: 3, reps: "10-15", rest: 45, effort: "rpe8", description: "Hang from a pull-up bar with arms fully extended — use the rock holds if you want extra grip work. Raise your legs by curling your hips up and bringing your knees toward your chest, then lower with control without swinging." },
  ]},
};
 
const WEEK = [
  { label: "Mon", dayKey: "1" },
  { label: "Tue", dayKey: "2" },
  { label: "Wed", dayKey: "3" },
  { label: "Thu", dayKey: null },
  { label: "Fri", dayKey: "4" },
  { label: "Sat", dayKey: "5" },
  { label: "Sun", dayKey: null },
];
 
const EFFORT = {
  fail: { text: "FAILURE", color: C.accent },
  rpe8: { text: "RPE 8",   color: C.warn   },
  rpe7: { text: "RPE 7",   color: C.success },
};
 
// ---- STATE ----
let currentDayKey = null;
let steps = [];
let stepIdx = 0;
let restInterval = null;
let restSecondsLeft = 0;
let restTotal = 0;
let restPaused = false;
let infoOpen = false;
 
// ---- PERSIST ----
const SAVE_KEY = 'workout_progress';
 
function saveProgress() {
  if (!currentDayKey) return;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ dayKey: currentDayKey, stepIdx })); } catch(e) {}
}
 
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)); } catch { return null; }
}
 
function clearProgress() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}
 
// ---- BUILD STEPS ----
function buildSteps(plan) {
  const s = [];
  plan.exercises.forEach((ex, exIdx) => {
    for (let si = 0; si < ex.sets; si++) {
      s.push({ type: 'set', exIdx, setIdx: si, exercise: ex });
      const lastSet = si === ex.sets - 1;
      const lastEx  = exIdx === plan.exercises.length - 1;
      if (!(lastSet && lastEx)) {
        s.push({ type: 'rest', exIdx, setIdx: si, exercise: ex, duration: ex.rest });
      }
    }
  });
  return s;
}
 
// ---- HELPERS ----
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}
 
function effortBadge(effort, large = false) {
  const e = EFFORT[effort];
  const size = large ? 'font-size:12px;padding:5px 12px;border-radius:8px' : 'font-size:10px;padding:3px 7px;border-radius:6px';
  return `<span class="effort-badge" style="${size};color:${e.color};background:${e.color}1A">${e.text}</span>`;
}
 
function setProgressBar() {
  if (!currentDayKey) return;
  const plan = PLAN[currentDayKey];
  const total = plan.exercises.reduce((a, e) => a + e.sets, 0);
  const done = steps.slice(0, stepIdx).filter(s => s.type === 'set').length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
}
 
// ---- SCREENS ----
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
 
function showSubScreen(id) {
  ['set-screen', 'rest-screen', 'complete-screen'].forEach(s => {
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}
 
// ---- RESUME BANNER ----
function renderResumeBanner() {
  const saved = loadProgress();
  const existing = document.getElementById('resume-banner');
  if (existing) existing.remove();
 
  if (!saved || !PLAN[saved.dayKey]) return;
 
  const plan = PLAN[saved.dayKey];
  const savedSteps = buildSteps(plan);
  const step = savedSteps[saved.stepIdx];
  if (!step) return;
 
  // figure out a human-readable position
  const doneSets = savedSteps.slice(0, saved.stepIdx).filter(s => s.type === 'set').length;
  const totalSets = plan.exercises.reduce((a, e) => a + e.sets, 0);
  const weekEntry = WEEK.find(w => w.dayKey === saved.dayKey);
  const dayLabel = weekEntry ? weekEntry.label : `Day ${saved.dayKey}`;
 
  const banner = document.createElement('div');
  banner.id = 'resume-banner';
  banner.style.cssText = `
    background:${C.card};border:1px solid ${C.accent}44;border-radius:16px;
    padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  `;
  banner.innerHTML = `
    <div>
      <div style="font-size:11px;font-weight:700;color:${C.accent};letter-spacing:.1em;margin-bottom:3px">IN PROGRESS</div>
      <div style="font-size:15px;font-weight:700;color:${C.t1}">${dayLabel} · ${plan.name}</div>
      <div style="font-size:13px;color:${C.t2};margin-top:2px">${doneSets} of ${totalSets} sets done</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0">
      <button onclick="resumeWorkout()" style="padding:8px 16px;border-radius:10px;background:${C.accent};color:#000;font-weight:700;font-size:13px;border:none;cursor:pointer">Resume</button>
      <button onclick="discardProgress()" style="padding:6px 16px;border-radius:10px;background:transparent;color:${C.t3};font-size:12px;border:1px solid ${C.border};cursor:pointer">Discard</button>
    </div>`;
 
  const picker = document.getElementById('picker');
  picker.insertBefore(banner, document.getElementById('day-list'));
}
 
function resumeWorkout() {
  const saved = loadProgress();
  if (!saved) return;
  currentDayKey = saved.dayKey;
  steps = buildSteps(PLAN[currentDayKey]);
  stepIdx = saved.stepIdx;
  // if we were mid-rest when closed, step back to the set that triggered it
  if (steps[stepIdx] && steps[stepIdx].type === 'rest') stepIdx--;
  if (stepIdx < 0) stepIdx = 0;
  document.getElementById('wh-day-name').textContent = PLAN[currentDayKey].name;
  showScreen('workout');
  renderStep();
}
 
function discardProgress() {
  clearProgress();
  renderResumeBanner();
}
 
// ---- PICKER ----
function renderPicker() {
  const list = document.getElementById('day-list');
  list.innerHTML = '';
  WEEK.forEach(({ label, dayKey }) => {
    if (!dayKey) {
      list.innerHTML += `
        <div class="day-card rest-card">
          <div style="display:flex;align-items:center">
            <div class="rest-icon-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${C.restAcc}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </div>
            <div>
              <div class="day-eyebrow">${label.toUpperCase()}</div>
              <div class="day-name">Rest Day</div>
            </div>
          </div>
          <span style="font-size:12px;color:${C.t3}">Recover</span>
        </div>`;
    } else {
      const plan = PLAN[dayKey];
      const totalSets = plan.exercises.reduce((a, e) => a + e.sets, 0);
      list.innerHTML += `
        <button class="day-card" onclick="selectDay('${dayKey}')">
          <div>
            <div class="day-eyebrow">${label.toUpperCase()}</div>
            <div class="day-name">${plan.name}</div>
            <div class="day-meta">${plan.sub} · ${plan.exercises.length} exercises · ${totalSets} sets</div>
          </div>
          <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>`;
    }
  });
  renderResumeBanner();
}
 
function showPicker() {
  clearRestTimer();
  currentDayKey = null;
  steps = [];
  stepIdx = 0;
  showScreen('picker');
  renderResumeBanner();
}
 
// ---- OVERVIEW ----
function selectDay(dayKey) {
  currentDayKey = dayKey;
  const plan = PLAN[dayKey];
  const weekEntry = WEEK.find(w => w.dayKey === dayKey);
  const totalSets = plan.exercises.reduce((a, e) => a + e.sets, 0);
  const estMins = Math.round(plan.exercises.reduce((a, e) => a + e.sets * 45 + (e.sets - 1) * e.rest, 0) / 60);
 
  document.getElementById('ov-day-label').textContent = weekEntry ? weekEntry.label.toUpperCase() : `DAY ${dayKey}`;
  document.getElementById('ov-title').textContent = plan.name;
  document.getElementById('ov-sub').textContent = plan.sub;
  document.getElementById('ov-excount').textContent = plan.exercises.length;
  document.getElementById('ov-sets').textContent = totalSets;
  document.getElementById('ov-mins').textContent = `~${estMins}`;
 
  const inner = document.getElementById('ex-list-inner');
  inner.innerHTML = '';
  plan.exercises.forEach((ex, i) => {
    const div = document.createElement('button');
    div.className = 'ex-row';
    div.innerHTML = `
      <div class="ex-row-top">
        <div style="display:flex;align-items:center">
          <div class="ex-num">${i + 1}</div>
          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sets">${ex.sets} × ${ex.reps}</div>
          </div>
        </div>
        ${effortBadge(ex.effort)}
      </div>
      <div class="ex-desc" id="ov-desc-${i}">${ex.description || ''}</div>`;
    div.onclick = () => {
      const desc = document.getElementById(`ov-desc-${i}`);
      desc.classList.toggle('open');
    };
    inner.appendChild(div);
  });
 
  showScreen('overview');
}
 
// ---- WORKOUT ----
function startWorkout() {
  steps = buildSteps(PLAN[currentDayKey]);
  stepIdx = 0;
  infoOpen = false;
  saveProgress();
  document.getElementById('wh-day-name').textContent = PLAN[currentDayKey].name;
  showScreen('workout');
  renderStep();
}
 
function renderStep() {
  setProgressBar();
  const step = steps[stepIdx];
  if (!step) { renderComplete(); return; }
  if (step.type === 'set') renderSet(step);
  else renderRest(step);
}
 
function renderSet(step) {
  showSubScreen('set-screen');
  const plan = PLAN[currentDayKey];
  infoOpen = false;
 
  document.getElementById('ss-counter').textContent = `EXERCISE ${step.exIdx + 1} OF ${plan.exercises.length}`;
  document.getElementById('ss-name').textContent = step.exercise.name;
  document.getElementById('ss-reps').textContent = step.exercise.reps;
  document.getElementById('ss-setlabel').textContent = `Set ${step.setIdx + 1} of ${step.exercise.sets}`;
 
  const e = EFFORT[step.exercise.effort];
  const badge = document.getElementById('ss-effort');
  badge.textContent = e.text;
  badge.style.color = e.color;
  badge.style.background = e.color + '1A';
 
  const panel = document.getElementById('info-panel');
  panel.textContent = step.exercise.description || '';
  panel.classList.remove('open');
  document.getElementById('info-icon').setAttribute('stroke', C.t3);
 
  const pipsEl = document.getElementById('ss-pips');
  pipsEl.innerHTML = '';
  for (let i = 0; i < step.exercise.sets; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    const active = i === step.setIdx;
    const done = i < step.setIdx;
    pip.style.width = active ? '14px' : '10px';
    pip.style.height = active ? '14px' : '10px';
    pip.style.background = done ? C.success : active ? C.accent : C.border;
    pipsEl.appendChild(pip);
  }
}
 
function toggleInfo() {
  infoOpen = !infoOpen;
  document.getElementById('info-panel').classList.toggle('open', infoOpen);
  document.getElementById('info-icon').setAttribute('stroke', infoOpen ? C.accent : C.t3);
}
 
function completeSet() {
  advance();
}
 
function renderRest(step) {
  showSubScreen('rest-screen');
  clearRestTimer();
  restTotal = step.duration;
  restSecondsLeft = step.duration;
  restPaused = false;
 
  const next = steps[stepIdx + 1];
  let nextLabel = '';
  if (next) nextLabel = (next.type === 'set' && next.setIdx === 0) ? next.exercise.name : `Set ${next.setIdx + 1}`;
  document.getElementById('ring-next').textContent = `up next: ${nextLabel}`;
 
  updateRingDisplay();
  updatePauseBtn();
 
  restInterval = setInterval(() => {
    if (restPaused) return;
    restSecondsLeft--;
    if (restSecondsLeft <= 0) {
      restSecondsLeft = 0;
      clearInterval(restInterval);
      updateRingDisplay();
      document.getElementById('rest-label').textContent = 'REST COMPLETE';
      document.getElementById('pause-btn').style.display = 'none';
      const skipBtn = document.querySelector('#rest-screen .rest-btn:last-child');
      skipBtn.innerHTML = `Continue <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
      skipBtn.style.background = C.accent;
      skipBtn.style.color = '#000';
      skipBtn.style.border = 'none';
    } else {
      updateRingDisplay();
    }
  }, 1000);
}
 
function updateRingDisplay() {
  document.getElementById('ring-time').textContent = fmtTime(restSecondsLeft);
  document.getElementById('rest-label').textContent = restSecondsLeft === 0 ? 'REST COMPLETE' : 'RESTING';
  const r = 104;
  const circ = 2 * Math.PI * r;
  const progress = restTotal > 0 ? restSecondsLeft / restTotal : 0;
  const offset = circ * (1 - progress);
  const fill = document.getElementById('ring-fill');
  fill.setAttribute('stroke-dasharray', circ);
  fill.setAttribute('stroke-dashoffset', offset);
}
 
function updatePauseBtn() {
  document.getElementById('pause-label').textContent = restPaused ? 'Resume' : 'Pause';
  const icon = document.getElementById('pause-icon');
  if (restPaused) {
    icon.innerHTML = '<polygon points="5,3 19,12 5,21" fill="currentColor" stroke="none"/>';
  } else {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  }
}
 
function togglePause() {
  restPaused = !restPaused;
  updatePauseBtn();
}
 
function skipRest() {
  clearRestTimer();
  advance();
}
 
function clearRestTimer() {
  if (restInterval) { clearInterval(restInterval); restInterval = null; }
  document.getElementById('rest-label').textContent = 'RESTING';
  document.getElementById('pause-btn').style.display = '';
  const skipBtn = document.querySelector('#rest-screen .rest-btn:last-child');
  if (skipBtn) {
    skipBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19"/></svg> Skip`;
    skipBtn.style.background = '';
    skipBtn.style.color = '';
    skipBtn.style.border = '';
  }
}
 
function advance() {
  stepIdx++;
  saveProgress();
  if (stepIdx >= steps.length) { renderComplete(); return; }
  renderStep();
}
 
function renderComplete() {
  clearRestTimer();
  clearProgress();
  const plan = PLAN[currentDayKey];
  const total = plan.exercises.reduce((a, e) => a + e.sets, 0);
  document.getElementById('complete-sub').textContent = `${plan.name} — ${total} sets done. Nice work.`;
  showSubScreen('complete-screen');
  document.getElementById('progress-fill').style.width = '100%';
}
 
// ---- INIT ----
renderPicker();
</script>
